# morev.neeklo.ru — fam-anapa-growth (React/Vite SPA, static)
# Pattern: HAProxy :443 (SNI) -> nginx 127.0.0.1:9443; :80 — ACME + redirect.
# Add HAProxy SNI map line:  morev.neeklo.ru	bk_nginx

server {
    listen 127.0.0.1:9443 ssl http2;
    listen [::1]:9443 ssl http2;
    server_name morev.neeklo.ru;

    ssl_certificate     /etc/letsencrypt/live/morev.neeklo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/morev.neeklo.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/morev.neeklo.ru/dist;
    index index.html;

    client_max_body_size 50m;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets (Vite emits /assets/<hash>.<ext>)
    location ^~ /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Security headers (safe defaults; tighten CSP later when backend is wired)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    access_log /var/log/nginx/morev.neeklo.ru.access.log;
    error_log  /var/log/nginx/morev.neeklo.ru.error.log;
}

server {
    listen 80;
    listen [::]:80;
    server_name morev.neeklo.ru;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/morev.neeklo.ru;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
