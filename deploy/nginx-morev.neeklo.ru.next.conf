# morev.neeklo.ru — fam-anapa-growth (Next.js 15 SSR via PM2, reverse proxy)
# Pattern: HAProxy :443 (SNI) -> nginx 127.0.0.1:9443 -> Next.js on 127.0.0.1:3000
# HAProxy SNI map line already present: morev.neeklo.ru	bk_nginx

upstream fam_next_upstream {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream fam_api_upstream {
    server 127.0.0.1:4200 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

server {
    listen 127.0.0.1:9443 ssl http2;
    listen [::1]:9443 ssl http2;
    server_name morev.neeklo.ru;

    ssl_certificate     /etc/letsencrypt/live/morev.neeklo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/morev.neeklo.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 125m;

    # Security headers (Next.js also emits subset, nginx is the final source of truth)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # Compression
    gzip on;
    gzip_proxied any;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types
        text/plain text/css text/xml application/xml application/xml+rss
        application/javascript application/x-javascript application/json
        image/svg+xml application/manifest+json application/wasm;

    # ── NestJS backend (fam-api) ──
    location /api/ {
        proxy_pass http://fam_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        client_max_body_size 125m;
        proxy_buffering off;
    }

    # Long-lived cache for Next.js immutable build assets
    location /_next/static/ {
        proxy_pass http://fam_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # Public/static files (poster, logo, hero video, favicons)
    location ~* ^/(img|hero\.mp4|hero-720\.webm|favicon\.ico|manifest\.webmanifest|robots\.txt|sitemap\.xml)(/.*)?$ {
        proxy_pass http://fam_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
        access_log off;
    }

    # Everything else — SSR / RSC / app router
    location / {
        proxy_pass http://fam_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_buffering on;
        proxy_buffers 16 64k;
        proxy_buffer_size 32k;
    }

    access_log /var/log/nginx/morev.neeklo.ru.access.log;
    error_log  /var/log/nginx/morev.neeklo.ru.error.log;
}

server {
    listen 80;
    listen [::]:80;
    server_name morev.neeklo.ru;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/morev.neeklo.ru;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
