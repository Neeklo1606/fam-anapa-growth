# Этап 2: HTTPS после `certbot certonly --webroot` (cert в /etc/letsencrypt/live/footballacademymorev.ru/).
# Отключите http-bootstrap конфиг в sites-enabled, включите только этот.

upstream fam_next_upstream {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream fam_api_upstream {
    server 127.0.0.1:4200 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name footballacademymorev.ru www.footballacademymorev.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://footballacademymorev.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name footballacademymorev.ru www.footballacademymorev.ru;

    ssl_certificate     /etc/letsencrypt/live/footballacademymorev.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/footballacademymorev.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_proxied any;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    location ^~ /uploads/ {
        alias /var/www/footballacademymorev/repo/uploads/;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;
    }

    location /api/ {
        proxy_pass http://fam_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
        proxy_buffering off;
    }

    location /_next/static/ {
        proxy_pass http://fam_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* ^/(img|hero\.mp4|hero-720\.webm|favicon\.ico|manifest\.webmanifest|robots\.txt|sitemap\.xml)(/.*)?$ {
        proxy_pass http://fam_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
    }

    location / {
        proxy_pass http://fam_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_buffers 16 64k;
    }

    access_log /var/log/nginx/footballacademymorev.ssl.access.log;
    error_log  /var/log/nginx/footballacademymorev.ssl.error.log;
}
