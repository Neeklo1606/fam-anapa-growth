# Этап 1 (до выпуска сертификата): только HTTP :80 → PM2 (:3000, :4200) + ACME webroot.
# После certbot подключите ssl-конфиг и отключите этот файл из sites-enabled.

upstream fam_next_upstream {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream fam_api_upstream {
    server 127.0.0.1:4200 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name footballacademymorev.ru www.footballacademymorev.ru;

    client_max_body_size 50m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Медиа с диска (Nest пишет в REPO/uploads)
    location ^~ /uploads/ {
        alias /var/www/footballacademymorev/repo/uploads/;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;
    }

    location /api/ {
        proxy_pass http://fam_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
        proxy_buffering off;
    }

    location /_next/static/ {
        proxy_pass http://fam_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* ^/(img|hero\.mp4|hero-720\.webm|favicon\.ico|manifest\.webmanifest|robots\.txt|sitemap\.xml)(/.*)?$ {
        proxy_pass http://fam_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://fam_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/footballacademymorev.access.log;
    error_log  /var/log/nginx/footballacademymorev.error.log;
}
