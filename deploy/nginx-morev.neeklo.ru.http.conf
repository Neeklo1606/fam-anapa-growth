# morev.neeklo.ru — fam-anapa-growth (React/Vite static)
# Pattern: HAProxy :443 (SNI) -> nginx 127.0.0.1:9443; :80 — ACME + redirect.

server {
    listen 80;
    listen [::]:80;
    server_name morev.neeklo.ru;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/morev.neeklo.ru;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
